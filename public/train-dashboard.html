<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Training Dashboard — Asteroids → Elite</title>
  <link rel="stylesheet" href="train-dashboard.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-icon">🧠</span>
        <h1>AI Training Dashboard</h1>
      </div>
      <p class="subtitle">Neuroevolution for the demo AI ship controller</p>
    </header>

    <main class="app-main">
      <!-- Stats cards -->
      <section class="stats-grid">
        <div class="stat-card" data-stat="generation">
          <div class="stat-label">Generation</div>
          <div class="stat-value">—</div>
        </div>
        <div class="stat-card" data-stat="bestFitness">
          <div class="stat-label">Best Fitness</div>
          <div class="stat-value">—</div>
        </div>
        <div class="stat-card" data-stat="avgFitness">
          <div class="stat-label">Average Fitness</div>
          <div class="stat-value">—</div>
        </div>
        <div class="stat-card" data-stat="bestEver">
          <div class="stat-label">Best Ever</div>
          <div class="stat-value">—</div>
        </div>
      </section>

      <!-- Chart + Controls -->
      <section class="dashboard-row">
        <div class="panel chart-panel">
          <h2 class="panel-title">Fitness History</h2>
          <canvas id="fitness-chart" width="800" height="320"></canvas>
          <div class="chart-legend">
            <span class="legend-item best"><span class="legend-dot"></span> Best</span>
            <span class="legend-item avg"><span class="legend-dot"></span> Average</span>
          </div>
        </div>

        <div class="panel controls-panel">
          <h2 class="panel-title">Controls</h2>

          <div class="control-group">
            <label>Population Size</label>
            <input type="number" id="param-pop" value="100" min="10" max="500">
          </div>
          <div class="control-group">
            <label>Hidden Neurons</label>
            <input type="number" id="param-hidden" value="12" min="4" max="64">
          </div>
          <div class="control-group">
            <label>Episode Duration (s)</label>
            <input type="number" id="param-duration" value="60" min="10" max="300">
          </div>

          <div class="button-row">
            <button id="btn-start" class="btn btn-primary">▶ Start</button>
            <button id="btn-stop" class="btn btn-danger" disabled>⏹ Stop</button>
          </div>
          <div class="button-row">
            <button id="btn-deploy" class="btn btn-secondary" disabled>🚀 Deploy to Game</button>
            <button id="btn-download" class="btn btn-secondary" disabled>⬇ Download</button>
          </div>

          <div class="upload-area" id="upload-area">
            <p>Drop a genome JSON here, or click to upload</p>
            <input type="file" id="upload-input" accept=".json,application/json">
          </div>
        </div>
      </section>

      <!-- Log -->
      <section class="panel log-panel">
        <h2 class="panel-title">Training Log</h2>
        <div class="log-entries" id="log-entries"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>
        Game runs on <a href="http://localhost:5173" target="_blank">localhost:5173</a>
        · Training server on <a href="http://localhost:5174" target="_blank">localhost:5174</a>
      </p>
    </footer>
  </div>

  <script src="train-dashboard.js"></script>
</body>
</html>
